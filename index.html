<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B4332">
<title>JRA Residents</title>
<style>
/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F2F4F3;
  color: #1A1A1A;
  min-height: 100vh;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

/* ── TOKENS ── */
:root {
  --green-dark:  #1B4332;
  --green-mid:   #2D6A4F;
  --green-soft:  #52B788;
  --green-pale:  #D8F3DC;
  --accent:      #F4A261;   /* warm amber — receipt / CTA contrast */
  --accent-dark: #E07C32;
  --red:         #C1121F;
  --red-pale:    #FFE5E7;
  --gray-1:      #F2F4F3;
  --gray-2:      #E4E7E5;
  --gray-3:      #9CA8A2;
  --gray-4:      #4A5550;
  --white:       #FFFFFF;
  --radius-sm:   10px;
  --radius-md:   16px;
  --radius-lg:   24px;
  --shadow-sm:   0 1px 4px rgba(0,0,0,0.08);
  --shadow-md:   0 4px 16px rgba(0,0,0,0.12);
}

/* ── PAGES (SPA) ── */
.page { display: none; min-height: 100vh; flex-direction: column; }
.page.active { display: flex; }

/* ── TOPBAR ── */
.topbar {
  background: var(--green-dark);
  color: var(--white);
  padding: 52px 20px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
.topbar-sub   { font-size: 12px; opacity: 0.65; margin-top: 1px; }
.back-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: none; color: white;
  font-size: 20px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}

/* ── SCROLL BODY ── */
.scroll-body { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }

/* ── SEARCH BAR ── */
.search-wrap { padding: 12px 16px 4px; background: var(--green-dark); }
.search-inner {
  background: rgba(255,255,255,0.15);
  border-radius: 12px;
  display: flex; align-items: center;
  padding: 0 14px; gap: 8px;
}
.search-inner input {
  flex: 1; border: none; background: transparent;
  color: white; font-size: 15px; padding: 12px 0;
  outline: none; font-family: inherit;
}
.search-inner input::placeholder { color: rgba(255,255,255,0.55); }
.search-icon { font-size: 18px; opacity: 0.7; }

/* ── RESIDENT LIST ITEM ── */
.res-item {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.1s;
  active-scale: 0.98;
}
.res-item:active { transform: scale(0.985); }
.res-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--green-pale);
  color: var(--green-dark);
  font-size: 18px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.res-info { flex: 1; min-width: 0; }
.res-name { font-size: 16px; font-weight: 700; color: #1A1A1A; }
.res-jra  { font-size: 13px; color: var(--gray-3); margin-top: 2px; }
.res-home { font-size: 12px; color: var(--gray-3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-arrow { color: var(--gray-3); font-size: 20px; }

/* ── FAB ── */
.fab {
  position: fixed; bottom: 28px; right: 20px; z-index: 100;
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--accent);
  color: white; font-size: 28px; font-weight: 300;
  border: none; box-shadow: 0 4px 20px rgba(244,162,97,0.5);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.15s;
}
.fab:active { transform: scale(0.92); }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--gray-3);
  margin: 20px 0 10px;
}
.section-label:first-child { margin-top: 0; }

/* ── DETAIL CARDS ── */
.info-card {
  background: var(--white);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
}
.info-row {
  display: flex; align-items: center;
  padding: 15px 16px;
  border-bottom: 1px solid var(--gray-2);
  gap: 14px;
}
.info-row:last-child { border-bottom: none; }
.info-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
.info-text { flex: 1; }
.info-label { font-size: 12px; color: var(--gray-3); font-weight: 600; }
.info-value { font-size: 15px; font-weight: 600; color: #1A1A1A; margin-top: 1px; }
.info-value.placeholder { color: var(--gray-3); font-weight: 400; font-style: italic; }

/* ── ACTION BUTTONS ── */
.action-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px;
}
.action-row.single { grid-template-columns: 1fr; }
.btn {
  padding: 16px; border: none; border-radius: var(--radius-md);
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; gap: 8px;
  transition: transform 0.1s, opacity 0.1s;
}
.btn:active { transform: scale(0.97); opacity: 0.88; }
.btn-primary { background: var(--green-dark); color: white; }
.btn-outline  {
  background: var(--white); color: var(--green-dark);
  border: 2px solid var(--green-dark);
}
.btn-accent   { background: var(--accent); color: white; }
.btn-wa       { background: #25D366; color: white; }
.btn-danger   { background: var(--red); color: white; }
.btn-gray     { background: var(--gray-2); color: var(--gray-4); }
.btn-full     { width: 100%; }
.btn-icon     { font-size: 20px; }

/* ── PAYMENT STATUS CARD ── */
.pay-status-card {
  background: var(--white);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 12px;
}
.pay-status-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--gray-2);
}
.pay-status-row:last-child { border-bottom: none; }
.pay-status-label { font-size: 14px; color: var(--gray-4); font-weight: 500; }
.pay-status-value { font-size: 15px; font-weight: 700; }
.tag-paid   { color: #2D6A4F; background: var(--green-pale); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
.tag-unpaid { color: var(--red); background: var(--red-pale); padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
.due-amount { color: var(--red); font-size: 22px; font-weight: 800; }
.due-zero   { color: #2D6A4F; font-size: 22px; font-weight: 800; }

/* ── FORM ELEMENTS ── */
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; font-weight: 700; color: var(--gray-4); margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; padding: 14px 16px;
  border: 2px solid var(--gray-2);
  border-radius: var(--radius-md);
  font-size: 16px; font-family: inherit;
  background: var(--white); color: #1A1A1A;
  outline: none;
  -webkit-appearance: none; appearance: none;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus { border-color: var(--green-mid); }
.form-select-wrap { position: relative; }
.form-select-wrap::after {
  content: "▾"; position: absolute; right: 16px; top: 50%;
  transform: translateY(-50%); pointer-events: none;
  font-size: 16px; color: var(--gray-3);
}
.form-select { padding-right: 40px; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1A1A1A; color: white;
  padding: 12px 22px; border-radius: 100px;
  font-size: 14px; font-weight: 600;
  z-index: 999; opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  white-space: nowrap; max-width: 90vw;
  text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon  { font-size: 56px; display: block; margin-bottom: 14px; }
.empty-title { font-size: 17px; font-weight: 700; color: var(--gray-4); }
.empty-sub   { font-size: 14px; color: var(--gray-3); margin-top: 6px; }

/* ── MODAL SHEET ── */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  align-items: flex-end;
}
.modal-bg.open { display: flex; }
.modal-sheet {
  background: var(--white); width: 100%;
  border-radius: 24px 24px 0 0;
  padding: 12px 20px 40px;
  max-height: 90vh; overflow-y: auto;
  animation: sheetUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle {
  width: 40px; height: 4px; background: var(--gray-2);
  border-radius: 2px; margin: 0 auto 20px;
}
.sheet-title { font-size: 18px; font-weight: 800; color: var(--green-dark); margin-bottom: 20px; }

/* ── PAID MONTHS CHIPS ── */
.months-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.month-chip {
  padding: 6px 14px; border-radius: 20px;
  background: var(--green-pale); color: var(--green-dark);
  font-size: 13px; font-weight: 700;
}

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--gray-2); margin: 16px 0; }

/* ── LOADING ── */
.spinner {
  display: flex; align-items: center; justify-content: center;
  padding: 40px;
}
.spinner::after {
  content: '';
  width: 36px; height: 36px;
  border: 3px solid var(--gray-2);
  border-top-color: var(--green-mid);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.count-badge {
  background: var(--green-pale); color: var(--green-dark);
  font-size: 12px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}

/* ── AVATAR COLORS ── */
.res-avatar.c0 { background:#D8F3DC; color:#1B4332; }
.res-avatar.c1 { background:#FDE8D0; color:#7C3D12; }
.res-avatar.c2 { background:#DBEAFE; color:#1E40AF; }
.res-avatar.c3 { background:#FCE7F3; color:#9D174D; }
.res-avatar.c4 { background:#FEF9C3; color:#713F12; }
.res-avatar.c5 { background:#E0E7FF; color:#3730A3; }

/* ── BLOOD GROUP BADGE ── */
.blood-badge {
  display: inline-flex; align-items: center; gap: 4px;
  background: #FEE2E2; color: #991B1B;
  padding: 4px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 800;
}

/* ── OWNERSHIP TAG ── */
.own-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 20px;
  font-size: 13px; font-weight: 700;
}
.own-tag.owned  { background: #D8F3DC; color: #1B4332; }
.own-tag.rented { background: #FDE8D0; color: #7C3D12; }

/* ── TENANT SECTION (conditional in modal) ── */
#tenant-fields { display: none; }
#tenant-fields.show { display: block; }

/* ── HERO CARD on detail page ── */
.hero-card {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
  border-radius: var(--radius-md);
  padding: 20px 16px;
  margin-bottom: 16px;
  color: white;
  display: flex; align-items: center; gap: 16px;
  box-shadow: 0 4px 20px rgba(27,67,50,0.3);
}
.hero-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: rgba(255,255,255,0.2);
  font-size: 24px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.hero-name  { font-size: 18px; font-weight: 800; }
.hero-jra   { font-size: 13px; opacity: 0.75; margin-top: 2px; }
.hero-tags  { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.hero-tag   {
  background: rgba(255,255,255,0.2);
  padding: 3px 10px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
}

/* ── LIST ITEM IMPROVEMENTS ── */
.res-item {
  border-left: 4px solid transparent;
}
.res-item.owned-item  { border-left-color: var(--green-soft); }
.res-item.rented-item { border-left-color: var(--accent); }

#page-login {
  background: var(--green-dark);
  align-items: center; justify-content: center;
  padding: 24px;
}
.login-card {
  background: var(--white);
  border-radius: var(--radius-lg);
  padding: 32px 24px;
  width: 100%; max-width: 360px;
  box-shadow: var(--shadow-md);
}
.login-logo { text-align: center; font-size: 44px; margin-bottom: 6px; }
.login-title { text-align: center; font-size: 20px; font-weight: 800; color: var(--green-dark); }
.login-sub   { text-align: center; font-size: 13px; color: var(--gray-3); margin-bottom: 24px; }
.login-error {
  background: var(--red-pale); color: var(--red);
  padding: 10px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  margin-bottom: 14px; display: none; text-align: center;
}
.login-error.show { display: block; }

/* ── ADMIN BADGE / EXPORT BAR ── */
.admin-bar {
  background: var(--accent);
  color: white;
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; font-weight: 700;
}
.admin-bar button {
  background: rgba(255,255,255,0.25); color: white;
  border: none; padding: 8px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 700; cursor: pointer;
}
.logout-link {
  font-size: 12px; color: var(--gray-3); text-align: center;
  margin-top: 18px; text-decoration: underline; cursor: pointer;
}
</style>
</head>
<body>

<!-- ════════════════════════════════════
     PAGE 0 — LOGIN
════════════════════════════════════ -->
<div id="page-login" class="page active">
  <div class="login-card">
    <div class="login-logo">🏘️</div>
    <div class="login-title">JRA Members</div>
    <div class="login-sub">Jalakam Residents Association</div>

    <div class="login-error" id="login-error">Incorrect username or password</div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="login-user" type="text" placeholder="Enter username" autocapitalize="off" autocomplete="off">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" id="login-pass" type="password" placeholder="Enter password">
    </div>

    <button class="btn btn-primary btn-full" onclick="attemptLogin()">Log In</button>
  </div>
</div>

<!-- ════════════════════════════════════
     PAGE 1 — RESIDENT LIST
════════════════════════════════════ -->
<div id="page-list" class="page">
  <div id="admin-bar-slot"></div>
  <div class="topbar" style="flex-direction:column; align-items:flex-start; gap:0; padding-bottom:0">
    <div style="display:flex;width:100%;align-items:center;justify-content:space-between;padding-bottom:10px">
      <div>
        <div class="topbar-title">🏘️ JRA Members</div>
        <div class="topbar-sub">Jalakam Residents Association</div>
      </div>
      <span id="list-count" class="count-badge">—</span>
    </div>
    <div class="search-wrap" style="padding:0 0 12px; width:100%">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input type="search" id="search-input" placeholder="Search name or JRA number…" oninput="filterResidents()">
      </div>
    </div>
  </div>

  <div class="scroll-body" id="list-body">
    <div class="spinner"></div>
  </div>

  <button class="fab" onclick="openAddResident()" title="Add Resident">＋</button>
  <button class="fab" style="right:auto; left:20px; background:var(--gray-2); color:var(--gray-4); width:48px; height:48px; font-size:18px" onclick="logout()" title="Logout">⎋</button>
</div>

<!-- ════════════════════════════════════
     PAGE 2 — RESIDENT DETAIL
════════════════════════════════════ -->
<div id="page-detail" class="page">
  <div class="topbar">
    <button class="back-btn" onclick="goBack('page-list')">‹</button>
    <div>
      <div class="topbar-title" id="detail-title">Resident</div>
      <div class="topbar-sub" id="detail-sub"></div>
    </div>
  </div>

  <div class="scroll-body" id="detail-body">
    <div class="spinner"></div>
  </div>
</div>

<!-- ════════════════════════════════════
     PAGE 3 — PAYMENT DETAILS
════════════════════════════════════ -->
<div id="page-payment" class="page">
  <div class="topbar">
    <button class="back-btn" onclick="goBack('page-detail')">‹</button>
    <div>
      <div class="topbar-title">Payment Details</div>
      <div class="topbar-sub" id="pay-sub"></div>
    </div>
  </div>

  <div class="scroll-body" id="payment-body">
    <div class="spinner"></div>
  </div>
</div>

<!-- ════════════════════════════════════
     MODAL — ADD / EDIT RESIDENT
════════════════════════════════════ -->
<div class="modal-bg" id="modal-resident" onclick="modalBgClick(event)">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title" id="modal-res-title">Add New Resident</div>

    <div class="form-group">
      <label class="form-label">JRA Number *</label>
      <input class="form-input" id="f-jra" type="text" placeholder="e.g. J-42" inputmode="text">
    </div>
    <div class="form-group">
      <label class="form-label">Owner Name *</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Rajan Pillai">
    </div>
    <div class="form-group">
      <label class="form-label">Home Name</label>
      <input class="form-input" id="f-home" type="text" placeholder="e.g. Sree Nilayam">
    </div>
    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input class="form-input" id="f-phone" type="tel" placeholder="9876543210" inputmode="tel">
    </div>
    <div class="form-group">
      <label class="form-label">WhatsApp Number</label>
      <input class="form-input" id="f-wa" type="tel" placeholder="9876543210 (if different)" inputmode="tel">
    </div>
    <div class="form-group">
      <label class="form-label">Start Month (Joining Month) *</label>
      <div class="form-select-wrap">
        <select class="form-select" id="f-start-month"></select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Blood Group</label>
      <div class="form-select-wrap">
        <select class="form-select" id="f-blood">
          <option value="">-- Select Blood Group --</option>
          <option value="A+">A+</option>
          <option value="A-">A-</option>
          <option value="B+">B+</option>
          <option value="B-">B-</option>
          <option value="AB+">AB+</option>
          <option value="AB-">AB-</option>
          <option value="O+">O+</option>
          <option value="O-">O-</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Home Status</label>
      <div class="form-select-wrap">
        <select class="form-select" id="f-status" onchange="toggleTenantFields()">
          <option value="Owned">Owned</option>
          <option value="Rented">Rented</option>
        </select>
      </div>
    </div>
    <div id="tenant-fields">
      <div class="form-group">
        <label class="form-label">Tenant Name</label>
        <input class="form-input" id="f-tenant-name" type="text" placeholder="e.g. Suresh Kumar">
      </div>
      <div class="form-group">
        <label class="form-label">Tenant Contact</label>
        <input class="form-input" id="f-tenant-phone" type="tel" placeholder="9876543210" inputmode="tel">
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
      <button class="btn btn-gray" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveResident()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
// ══════════════════════════════════════════
//  AUTH — hardcoded, cosmetic gate only
// ══════════════════════════════════════════
const USERS = {
  "jyothis": { password: "jyothis123", role: "user" },
  "admin":   { password: "Admin@9876543210", role: "admin" }
};
let currentRole = null;

function attemptLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');

  const match = USERS[u];
  if (!match || match.password !== p) {
    errEl.classList.add('show');
    return;
  }
  errEl.classList.remove('show');
  currentRole = match.role;
  sessionStorage.setItem('jra_role', currentRole); // survives refresh, not browser close on some setups — acceptable for cosmetic gate
  renderAdminBar();
  showPage('page-list');
  loadResidents();
}

function renderAdminBar() {
  const slot = document.getElementById('admin-bar-slot');
  if (currentRole === 'admin') {
    slot.innerHTML = `
      <div class="admin-bar">
        <span>👑 Admin Mode</span>
        <button onclick="exportReport()">📄 Export Report</button>
      </div>`;
  } else {
    slot.innerHTML = '';
  }
}

function logout() {
  currentRole = null;
  sessionStorage.removeItem('jra_role');
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('admin-bar-slot').innerHTML = '';
  showPage('page-login');
}

//  ADMIN — EXPORT REPORT AS PDF
// ══════════════════════════════════════════
async function exportReport() {
  showToast('⏳ Building report…');
  try {
    const data = await api({ action: "getAllSummary" });
    if (!data.ok) throw new Error(data.error);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const now = new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });

    doc.setFontSize(16);
    doc.setFont(undefined, 'bold');
    doc.text("JRA Members - Payment Report", 14, 18);
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text("Generated: " + now, 14, 25);

    const headers = [["JRA ID", "Resident Name", "Paid Till", "Pending Till", "Total Paid (Rs)"]];
    const rows = data.rows.map(r => [
      r.jra, r.ownerName, r.paidTill || '-', r.pendingTill || 'Up to date', r.totalPaid.toString()
    ]);

    doc.autoTable({
      head: headers, body: rows, startY: 32,
      styles: { fontSize: 9, cellPadding: 3 },
      headStyles: { fillColor: [27, 67, 50] }
    });

    doc.save("JRA_Payment_Report_" + Date.now() + ".pdf");
    showToast('✅ Report downloaded!');
  } catch (e) {
    showToast('❌ ' + e.message);
  }
}

async function api(params) {
  const url = API + "?" + new URLSearchParams(params);
  const r = await fetch(url);
  return r.json();
}
async function apiPost(body) {
  const r = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function loadResidents() {
  try {
    const data = await api({ action: "getResidents" });
    if (!data.ok) throw new Error(data.error);
    allResidents = data.residents.sort((a, b) => String(a.jra).localeCompare(String(b.jra), undefined, { numeric: true }));
    filterResidents();
  } catch (e) {
    document.getElementById('list-body').innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">⚠️</span>
        <div class="empty-title">Could not load residents</div>
        <div class="empty-sub">${e.message}</div>
        <button class="btn btn-primary btn-full" style="margin-top:20px" onclick="loadResidents()">Retry</button>
      </div>`;
  }
}

function filterResidents() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  const filtered = q
    ? allResidents.filter(r =>
        r.ownerName.toLowerCase().includes(q) ||
        String(r.jra).toLowerCase().includes(q) ||
        (r.homeName || '').toLowerCase().includes(q))
    : allResidents;

  document.getElementById('list-count').textContent = filtered.length + " members";

  if (!filtered.length) {
    document.getElementById('list-body').innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">🔍</span>
        <div class="empty-title">No results</div>
        <div class="empty-sub">Try a different name or JRA number</div>
      </div>`;
    return;
  }

  document.getElementById('list-body').innerHTML = filtered.map(r => {
    const color = 'c' + (r.ownerName.charCodeAt(0) % 6);
    const rentClass = (r.homeStatus || '').toLowerCase() === 'rented' ? 'rented-item' : 'owned-item';
    return `
    <div class="res-item ${rentClass}" onclick="openDetail('${r.jra}')">
      <div class="res-avatar ${color}">${initials(r.ownerName)}</div>
      <div class="res-info">

        <div class="res-jra">JRA: ${r.jra}${r.bloodGroup ? ' · 🩸' + r.bloodGroup : ''}</div>
        ${r.homeName ? `<div class="res-home">🏠 ${r.homeName}${(r.homeStatus||'').toLowerCase()==='rented' ? ' · <span style="color:var(--accent);font-weight:700">Rented</span>' : ''}</div>` : ''}

// ── MONTH KEY HELPERS ──
function monthKey(monthStr) {
  if (!monthStr) return null;
  const s = String(monthStr).trim();

  // Handle ISO timestamp: "2025-01-01T..." or "2025-01-31T18:30:00.000Z"
  const isoMatch = s.match(/^(\d{4})-(\d{2})-\d{2}/);
  if (isoMatch) {
    const y = parseInt(isoMatch[1]);
    const m = parseInt(isoMatch[2]) - 1; // 0-based
    return { y, m };
  }

  // Handle "Mon Jun 01 2026 00:00:00 GMT+0530 (India Standard Time)"
  const dateObjMatch = s.match(/([A-Za-z]{3})\s+(\d{4})/);
  if (dateObjMatch) {
    const m = MONTHS_S.indexOf(dateObjMatch[1]);
    const y = parseInt(dateObjMatch[2]);
    if (m >= 0 && !isNaN(y)) return { y, m };
  }

  // Handle normal "Jan 2025"
  const parts = s.split(' ');
  if (parts.length >= 2) {
    const m = MONTHS_S.indexOf(parts[0]);
    const y = parseInt(parts[parts.length - 1]);
    if (m >= 0 && !isNaN(y)) return { y, m };
  }

  return null;
}

function monthKeyToIndex(mk) { return mk ? mk.y * 12 + mk.m : null; }
function indexToMonthKey(idx) { return { y: Math.floor(idx/12), m: idx%12 }; }
function fmtMK(mk) { return mk ? MONTHS_S[mk.m] + ' ' + mk.y : '—'; }
function fmtMKLong(mk) { return mk ? MONTHS[mk.m] + ' ' + mk.y : '—'; }

function calcPending(s, upToMonthStr) {
  const startMK  = monthKey(s.startMonth);
  const upToMK   = monthKey(upToMonthStr);
  if (!startMK || !upToMK) return 0;
  const startIdx = monthKeyToIndex(startMK);
  const upToIdx  = monthKeyToIndex(upToMK);
  if (upToIdx < startIdx) return 0;
  const totalMonths = upToIdx - startIdx + 1;
  const totalDue    = (!s.regPaid ? REG_FEE : 0) + (totalMonths * MONTHLY);
  return Math.max(0, totalDue - (s.totalPaid || 0));
}

function renderPaymentPage(s, jra) {
  const now           = new Date();
  const currentMK     = { y: now.getFullYear(), m: now.getMonth() };
  const currentMYStr  = fmtMK(currentMK);

  // Start month from resident record, fallback to current month
  const startMonth  = (currentRes && currentRes.StartMonth) ? currentRes.StartMonth : currentMYStr;
  s.startMonth      = startMonth;

  const startMK     = monthKey(startMonth);
  const startIdx    = monthKeyToIndex(startMK);
  const currentIdx  = monthKeyToIndex(currentMK);

  // Last paid month index
  const lastPaidIdx = s.lastPaidMonth ? monthKeyToIndex(monthKey(s.lastPaidMonth)) : null;

  // Last paid — format cleanly
  const lastPaidDisplay = s.lastPaidMonth ? fmtMK(monthKey(s.lastPaidMonth)) : '—';

  // Start month — format cleanly
  const startDisplay = s.startMonth ? fmtMK(monthKey(s.startMonth)) : '—';

  // Dropdown starts from month AFTER last paid (or start month if nothing paid)
  const dropStartIdx = lastPaidIdx !== null ? lastPaidIdx + 1 : startIdx;
  // Dropdown ends Dec of next year from current
  const dropEndMK  = { y: now.getFullYear() + 1, m: 11 };
  const dropEndIdx = monthKeyToIndex(dropEndMK);

  // Current pending (up to current month)
  const currentPending = calcPending(s, currentMYStr);
  const pendingColor   = currentPending > 0 ? 'due-amount' : 'due-zero';

  // Build dropdown options
  let monthOpts = '';
  for (let idx = dropStartIdx; idx <= dropEndIdx; idx++) {
    const mk  = indexToMonthKey(idx);
    const key = fmtMK(mk);
    monthOpts += `<option value="${key}">${fmtMKLong(mk)}</option>`;
  }

  document.getElementById('payment-body').innerHTML = `
    <div class="section-label">Payment Summary</div>
    <div class="pay-status-card">
      <div class="pay-status-row">
        <span class="pay-status-label">📅 Start Month</span>
        <span class="pay-status-value">${startDisplay}</span>
      </div>
      <div class="pay-status-row">
        <span class="pay-status-label">Registration Fee (₹${REG_FEE})</span>
        <span class="${s.regPaid ? 'tag-paid' : 'tag-unpaid'}">${s.regPaid ? 'Paid ✓' : 'Not Paid'}</span>
      </div>
      <div class="pay-status-row">
        <span class="pay-status-label">Last Paid For</span>
        <span class="pay-status-value">${lastPaidDisplay}</span>
      </div>
      <div class="pay-status-row" style="border-top:2px solid var(--gray-2);margin-top:4px;padding-top:14px">
        <span class="pay-status-label" style="font-weight:700">Pending Amount (till ${currentMYStr})</span>
        <span class="${pendingColor}" id="pending-display">₹${currentPending}</span>
      </div>
    </div>

    <div class="section-label">Record a Payment</div>
    <div class="info-card" style="padding:16px">
      <div class="form-group">
        <label class="form-label">Paying Until (Month)</label>
        <div class="form-select-wrap">
          <select class="form-select" id="pay-month" onchange="onPayMonthChange()">
            ${monthOpts || '<option value="">No pending months</option>'}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Amount to Pay (₹) <span style="font-size:11px;color:var(--gray-3)" id="pay-amount-hint"></span></label>
        <input class="form-input" id="pay-amount" type="number" inputmode="numeric" placeholder="Enter amount">
      </div>
      <div class="form-group">
        <label class="form-label">Mode of Payment</label>
        <div class="form-select-wrap">
          <select class="form-select" id="pay-mode">
            <option value="Cash">Cash</option>
            <option value="UPI">UPI</option>
            <option value="Bank Transfer">Bank Transfer</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Note (optional)</label>
        <input class="form-input" id="pay-note" type="text" placeholder="e.g. Receipt #123">
      </div>
    </div>

    <div class="pay-status-card" style="margin-top:4px">
      <div class="pay-status-row" style="border:none;padding:6px 0">
        <span class="pay-status-label" style="font-weight:700">Pending After This Payment</span>
        <span class="due-amount" id="pending-after">₹—</span>
      </div>
    </div>

    <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="savePayment('${jra}')">
      💾 Save Payment
    </button>

    <div id="receipt-section" style="display:none; margin-top:12px">
      <button class="btn btn-wa btn-full" id="wa-btn">
        <span class="btn-icon">📤</span> Send Receipt via WhatsApp
      </button>
    </div>

    <div class="divider"></div>
    <button class="btn btn-gray btn-full" onclick="goBack('page-detail')">
      ← Back to ${currentRes ? currentRes.OwnerName.split(' ')[0] + "'s Details" : 'Resident Details'}
    </button>
    <button class="btn btn-gray btn-full" style="margin-top:10px" onclick="goBack('page-list')">
      🏠 Home
    </button>
  `;

  // Trigger initial calculation
  onPayMonthChange();
}

function onPayMonthChange() {
  const s          = paymentSummary;
  if (!s) return;
  const payUntil   = document.getElementById('pay-month')?.value;
  if (!payUntil) return;

  const pending    = calcPending(s, payUntil);
  const afterEl    = document.getElementById('pending-after');
  const hintEl     = document.getElementById('pay-amount-hint');
  const amountEl   = document.getElementById('pay-amount');

  if (afterEl) afterEl.textContent = '₹' + pending;
  if (hintEl)  hintEl.textContent  = '(suggested: ₹' + pending + ')';
  if (amountEl && !amountEl.value) amountEl.value = pending;
}

async function savePayment(jra) {
  const payUntil = document.getElementById('pay-month')?.value;
  const amount   = parseFloat(document.getElementById('pay-amount')?.value);
  const mode     = document.getElementById('pay-mode')?.value || 'Cash';
  const note     = document.getElementById('pay-note')?.value.trim() || '';

  if (!payUntil) { showToast('⚠️ Select a month'); return; }
  if (!amount || amount <= 0) { showToast('⚠️ Enter a valid amount'); return; }

  const btn = document.querySelector('#payment-body .btn-primary');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    const res = await apiPost({
      action: "addPayment",
      jra,
      monthYear:   payUntil,
      amountPaid:  amount,
      modeOfPay:   mode,
      note:        note || 'maintenance'
    });
    if (!res.ok) throw new Error(res.error);

    showToast('✅ Payment saved!');
    buildReceiptLink(jra, payUntil, amount, mode);

    // Reload summary
    const data = await api({ action: "getPayments", jra });
    if (data.ok) {
      paymentSummary = data.summary;
      paymentSummary.startMonth = (currentRes && currentRes.StartMonth) ? currentRes.StartMonth : payUntil;
      renderPaymentPage(paymentSummary, jra);
    }
  } catch (e) {
    showToast('❌ ' + e.message);
  } finally {
    btn.textContent = '💾 Save Payment'; btn.disabled = false;
  }
}

function buildReceiptLink(jra, payUntil, amount, mode) {
  const r = currentRes || {};
  const wa = (r.WhatsApp || r.OwnerPhone || '').replace(/\D/g, '');

  const msg =
    `*JRA Payment Receipt*\n` +
    `━━━━━━━━━━━━━━━\n` +
    `👤 Name: ${r.OwnerName || jra}\n` +
    `🪪 JRA No: ${jra}\n` +
    `🏠 Home: ${r.HomeName || '—'}\n` +
    `━━━━━━━━━━━━━━━\n` +
    `📋 Paid Until: ${payUntil}\n` +
    `💰 Amount: ₹${amount}\n` +
    `💳 Mode: ${mode}\n` +
    `📅 Date: ${new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}\n` +
    `━━━━━━━━━━━━━━━\n` +
    `✅ Payment recorded by Jalakam Residents Association`;

  const encoded = encodeURIComponent(msg);
  const waUrl = wa
    ? `https://wa.me/91${wa}?text=${encoded}`
    : `https://wa.me/?text=${encoded}`;

  const section = document.getElementById('receipt-section');
  const waBtn   = document.getElementById('wa-btn');
  section.style.display = 'block';
  waBtn.onclick = () => window.open(waUrl, '_blank');
}

// ══════════════════════════════════════════
//  ADD / EDIT RESIDENT MODAL
// ══════════════════════════════════════════
function toggleTenantFields() {
  const status = document.getElementById('f-status').value;
  document.getElementById('tenant-fields').classList.toggle('show', status === 'Rented');
}

function buildStartMonthOptions(selected) {
  const now = new Date();
  let opts = '';
  for (let y = now.getFullYear() - 5; y <= now.getFullYear() + 1; y++) {
    for (let m = 0; m < 12; m++) {
      const key = MONTHS_S[m] + ' ' + y;
      const sel = key === selected ? 'selected' : '';
      opts += `<option value="${key}" ${sel}>${MONTHS[m]} ${y}</option>`;
    }
  }
  return opts;
}

function openAddResident() {
  editMode = false;
  document.getElementById('modal-res-title').textContent = 'Add New Resident';
  document.getElementById('modal-save-btn').textContent  = 'Add Resident';
  ['f-jra','f-name','f-home','f-phone','f-wa','f-tenant-name','f-tenant-phone'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-blood').value  = '';
  document.getElementById('f-status').value = 'Owned';
  document.getElementById('tenant-fields').classList.remove('show');
  document.getElementById('f-jra').disabled = false;
  const now = new Date();
  const currentMY = MONTHS_S[now.getMonth()] + ' ' + now.getFullYear();
  document.getElementById('f-start-month').innerHTML = buildStartMonthOptions(currentMY);
  document.getElementById('modal-resident').classList.add('open');
  setTimeout(() => document.getElementById('f-jra').focus(), 400);
}

function openEditResident() {
  if (!currentRes) return;
  editMode = true;
  document.getElementById('modal-res-title').textContent = 'Edit Resident';
  document.getElementById('modal-save-btn').textContent  = 'Save Changes';
  document.getElementById('f-jra').value          = currentRes.JRA;
  document.getElementById('f-name').value         = currentRes.OwnerName   || '';
  document.getElementById('f-home').value         = currentRes.HomeName    || '';
  document.getElementById('f-phone').value        = currentRes.OwnerPhone  || '';
  document.getElementById('f-wa').value           = currentRes.WhatsApp    || '';
  document.getElementById('f-blood').value        = currentRes.BloodGroup  || '';
  document.getElementById('f-status').value       = currentRes.HomeStatus  || 'Owned';
  document.getElementById('f-tenant-name').value  = currentRes.TenantName  || '';
  document.getElementById('f-tenant-phone').value = currentRes.TenantPhone || '';
  document.getElementById('tenant-fields').classList.toggle('show', (currentRes.HomeStatus || '') === 'Rented');
  document.getElementById('f-start-month').innerHTML = buildStartMonthOptions(currentRes.StartMonth || '');
  document.getElementById('f-jra').disabled = true;
  document.getElementById('modal-resident').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-resident').classList.remove('open');
}

function modalBgClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

async function saveResident() {
  const jra         = document.getElementById('f-jra').value.trim();
  const name        = document.getElementById('f-name').value.trim();
  const home        = document.getElementById('f-home').value.trim();
  const phone       = document.getElementById('f-phone').value.trim();
  const wa          = document.getElementById('f-wa').value.trim();
  const blood       = document.getElementById('f-blood').value;
  const status      = document.getElementById('f-status').value;
  const tenantName  = document.getElementById('f-tenant-name').value.trim();
  const tenantPhone = document.getElementById('f-tenant-phone').value.trim();
  const startMonth  = document.getElementById('f-start-month').value;

  if (!jra || !name) { showToast('⚠️ JRA number and name are required'); return; }

  const btn = document.getElementById('modal-save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  const payload = { jra, ownerName: name, homeName: home, ownerPhone: phone, whatsapp: wa, bloodGroup: blood, homeStatus: status, tenantName, tenantPhone, startMonth };

  try {
    let res;
    if (editMode) {
      res = await apiPost({ action: "updateResident", ...payload });
    } else {
      res = await apiPost({ action: "addResident", ...payload });
    }
    if (!res.ok) throw new Error(res.error);

    closeModal();
    showToast(editMode ? '✅ Details updated!' : '✅ Resident added!');

    if (editMode && currentRes) {
      currentRes.OwnerName   = name;
      currentRes.HomeName    = home;
      currentRes.OwnerPhone  = phone;
      currentRes.WhatsApp    = wa;
      currentRes.BloodGroup  = blood;
      currentRes.HomeStatus  = status;
      currentRes.TenantName  = tenantName;
      currentRes.TenantPhone = tenantPhone;
      currentRes.StartMonth  = startMonth;
      renderDetail();
    }

    loadResidents();

  } catch (e) {
    showToast('❌ ' + e.message);
  } finally {
    btn.textContent = editMode ? 'Save Changes' : 'Add Resident';
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
(function boot() {
  const savedRole = sessionStorage.getItem('jra_role');
  if (savedRole && USERS[savedRole === 'admin' ? 'admin' : 'jyothis']) {
    currentRole = savedRole;
    renderAdminBar();
    showPage('page-list');
    loadResidents();
  }
})();

document.getElementById('login-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptLogin();
});
</script>
